# ══════════════════════════════════════════════════════════════════════
# Kubernetes Namespaces - Environment Separation
# ══════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Namespace
metadata:
  name: development
  labels:
    environment: dev
---
apiVersion: v1
kind: Namespace
metadata:
  name: testing
  labels:
    environment: test
---
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    environment: prod
